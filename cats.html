<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Members | ZDAWG</title>
    
    <!-- Lavender Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-parchment: #f5f0e8;
            --bg-cream: #faf8f4;
            --text-dark: #3d3a36;
            --text-muted: #8a8580;
            --accent-lavender: #9b7b8e;
            --accent-purple: #7d5a6a;
            --border-light: #e0dbd3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-parchment);
            color: var(--text-dark);
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            line-height: 1.7;
        }

        .content-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border-light);
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 400;
            font-style: italic;
            color: var(--text-dark);
            letter-spacing: 1px;
            text-decoration: none;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .menu-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--text-dark);
            transition: all 0.3s ease;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2.5rem;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--accent-lavender);
        }

        .page-header {
            text-align: center;
            padding: 4rem 0 3rem;
        }

        .page-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 0.75rem;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            font-weight: 400;
            font-style: italic;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .cats-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            padding-bottom: 4rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .cat-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
            background: var(--bg-cream);
            border: 1px solid var(--border-light);
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .cat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(155, 123, 142, 0.15);
        }

        .cat-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
            filter: sepia(5%);
        }

        .cat-card:hover img {
            transform: scale(1.03);
            filter: sepia(0%);
        }

        .cat-card .cat-name {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2.5rem 1rem 1rem;
            background: linear-gradient(to top, rgba(61, 58, 54, 0.8), transparent);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 20px;
            color: white;
            text-align: center;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            margin: 2rem 0;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--accent-lavender);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
        }

        footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 13px;
            border-top: 1px solid var(--border-light);
        }

        @media (max-width: 768px) {
            .page-title { font-size: 32px; }
            
            nav { flex-wrap: wrap; }
            .menu-toggle { display: flex; }
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                padding: 1rem 0;
                margin-top: 1rem;
                border-top: 1px solid var(--border-light);
            }
            .nav-links.open { display: flex; }
            .nav-links a {
                margin: 0;
                padding: 0.75rem 0;
                border-bottom: 1px dotted var(--border-light);
            }
            .nav-links a:last-child { border-bottom: none; }
            
            .cats-gallery { grid-template-columns: 1fr; max-width: 300px; }
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <nav>
            <a href="index.html" class="logo">ZDAWG</a>
            <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links" id="navLinks">
                <a href="index.html#work">Work</a>
                <a href="index.html#about">About</a>
                <a href="tutoring.html">Tutoring</a>
                <a href="cats.html" class="active">Team</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </nav>
        <script>
            function toggleMenu() {
                document.getElementById('navLinks').classList.toggle('open');
            }
        </script>

        <a href="index.html" class="back-link">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg>
            Back to Portfolio
        </a>

        <div class="page-header">
            <!-- <div class="page-label">Reinforcement Learning (they trained me, not the other way around.)</div> -->
            <h1 class="page-title">Research Assistants</h1>
            <p class="page-subtitle">My Debugging Team</p>
        </div>

        <div class="cats-gallery">
            <div class="cat-card">
                <img src="johnny.jpg" alt="Johnny" style="object-position: center 30%;">
                <div class="cat-name">Johnny</div>
            </div>

            <div class="cat-card">
                <img src="kara.jpg" alt="Kara">
                <div class="cat-name">Kara</div>
            </div>

            <div class="cat-card">
                <img src="benek.jpg" alt="Benek" style="object-position: center 30%;">
                <div class="cat-name">Benek</div>
            </div>

            <div class="cat-card">
                <img src="duffie.JPG" alt="Duffie">
                <div class="cat-name">Duffie</div>
            </div>

        </div>

        <footer>
            <p>© 2026 zdawg</p>
        </footer>
    </div>

</body>
</html>
